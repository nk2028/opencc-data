name: Sync OpenCC Dictionary Data from Upstream

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: 'Commit ID or Tag from byvoid/OpenCC'
        required: true
        default: 'master'
      version:
        description: 'New version number for package.json'
        required: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Checkout byvoid/OpenCC
        uses: actions/checkout@v4
        with:
          repository: byvoid/OpenCC
          ref: ${{ github.event.inputs.upstream_ref }}
          path: upstream-opencc

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build OpenCC resource zip
        working-directory: upstream-opencc
        run: bazel build //data:opencc_resources_zip

      - name: Sync upstream data files
        run: |
          # Extract the resource zip to a temp directory
          mkdir -p /tmp/opencc-resources
          unzip upstream-opencc/bazel-bin/data/opencc-resources.zip -d /tmp/opencc-resources

          # Replace data/config/ with json configs from zip (excluding the manifest)
          rm -rf data/config
          mkdir -p data/config
          find /tmp/opencc-resources -maxdepth 1 -name '*.json' ! -name 'opencc-resource-manifest.json' \
            -exec cp {} data/config/ \;

          # Replace data/ txt files with dictionary files from zip
          find data -maxdepth 1 -type f -delete
          find /tmp/opencc-resources -maxdepth 1 -name '*.txt' -exec cp {} data/ \;

          # Copy testdata (original method)
          mkdir -p test-data
          cp upstream-opencc/test/testcases/testcases.json test-data/testcases.json

          # Remove upstream clone (keep /tmp/opencc-resources for the next step)
          rm -rf upstream-opencc

      - name: Add copyright headers to dictionary files
        run: |
          python3 scripts/add_dict_headers.py /tmp/opencc-resources/opencc-resource-manifest.json "${{ github.event.inputs.upstream_ref }}"
          rm -rf /tmp/opencc-resources

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update package.json version
        run: |
          npm version "${{ github.event.inputs.version }}" --no-git-tag-version || \
            echo "::warning::Skipping package.json version update because '${{ github.event.inputs.version }}' is not a valid npm version."

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update data from byvoid/OpenCC@${{ github.event.inputs.upstream_ref }} to version ${{ github.event.inputs.version }}"
          title: "Sync dictionary data from byvoid/OpenCC@${{ github.event.inputs.upstream_ref }}"
          body: |
            Automated sync from upstream.
            - Upstream ref: `${{ github.event.inputs.upstream_ref }}`
            - New version: `${{ github.event.inputs.version }}`
          branch: sync-data
          base: main
