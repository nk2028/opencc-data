name: Sync OpenCC Dictionary Data from Upstream

on:
  # Enable this after manual validation if we want daily upstream checks.
  # schedule:
  #   # Runs daily at 10:17 UTC.
  #   - cron: '17 10 * * *'
  workflow_dispatch:
    inputs:
      resource_source:
        description: 'Where to get OpenCC resources from'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - build
      release_tag:
        description: 'OpenCC release tag for published resources. Use latest for the latest release.'
        required: false
        default: 'latest'
      upstream_ref:
        description: 'Commit ID or tag from byvoid/OpenCC when resource_source is build'
        required: false
        default: 'master'
      version:
        description: 'New version number for package.json. Leave empty to use package.json version with -next.YYYYMMDD.'
        required: false
        default: ''

concurrency:
  group: update-opencc-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      RESOURCE_SOURCE: ${{ github.event.inputs.resource_source || 'release' }}
      OPENCC_RELEASE_TAG: ${{ github.event.inputs.release_tag || 'latest' }}
      UPSTREAM_REF: ${{ github.event.inputs.upstream_ref || 'master' }}
      PACKAGE_VERSION: ${{ github.event.inputs.version || '' }}
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download OpenCC release resources
        if: env.RESOURCE_SOURCE == 'release'
        id: release
        run: |
          set -euo pipefail

          tag="$OPENCC_RELEASE_TAG"
          if [ -z "$tag" ] || [ "$tag" = "latest" ]; then
            tag="$(curl -fsSL https://api.github.com/repos/BYVoid/OpenCC/releases/latest | python3 -c 'import json, sys; print(json.load(sys.stdin)["tag_name"])')"
          fi

          version="${tag#ver.}"
          version="${version#v}"
          resource_url="https://github.com/BYVoid/OpenCC/releases/download/${tag}/opencc-v${version}-resources.zip"
          testcases_url="https://raw.githubusercontent.com/BYVoid/OpenCC/${tag}/test/testcases/testcases.json"

          mkdir -p /tmp/opencc-release
          curl -fsSL "$resource_url" -o /tmp/opencc-release/opencc-resources.zip
          curl -fsSL "$testcases_url" -o /tmp/opencc-release/testcases.json

          sha="$(git ls-remote https://github.com/BYVoid/OpenCC.git "refs/tags/${tag}^{}" | cut -f1)"
          if [ -z "$sha" ]; then
            sha="$(git ls-remote https://github.com/BYVoid/OpenCC.git "refs/tags/${tag}" | cut -f1)"
          fi

          echo "ref=$tag" >> "$GITHUB_OUTPUT"
          echo "sha=${sha:-$tag}" >> "$GITHUB_OUTPUT"
          echo "resource_url=$resource_url" >> "$GITHUB_OUTPUT"

      - name: Checkout byvoid/OpenCC
        if: env.RESOURCE_SOURCE == 'build'
        uses: actions/checkout@v4
        with:
          repository: byvoid/OpenCC
          ref: ${{ env.UPSTREAM_REF }}
          path: upstream-opencc

      - name: Resolve upstream commit
        if: env.RESOURCE_SOURCE == 'build'
        id: upstream
        run: |
          echo "sha=$(git -C upstream-opencc rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup Bazel
        if: env.RESOURCE_SOURCE == 'build'
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          module-root: upstream-opencc
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Build OpenCC resource zip
        if: env.RESOURCE_SOURCE == 'build'
        working-directory: upstream-opencc
        run: OPENCC_WORKSPACE="$PWD" bazel build --workspace_status_command=../scripts/opencc-workspace-status.sh //data:opencc_resources_zip

      - name: Sync upstream data files
        run: |
          if [ "$RESOURCE_SOURCE" = "release" ]; then
            resource_zip=/tmp/opencc-release/opencc-resources.zip
          else
            resource_zip=upstream-opencc/bazel-bin/data/opencc-resources.zip
          fi

          # Extract the resource zip to a temp directory
          mkdir -p /tmp/opencc-resources
          unzip "$resource_zip" -d /tmp/opencc-resources

          # Replace data/config/ with json configs from zip (excluding the manifest)
          rm -rf data/config
          mkdir -p data/config
          find /tmp/opencc-resources -maxdepth 1 -name '*.json' ! -name 'opencc-resource-manifest.json' \
            -exec cp {} data/config/ \;

          # Replace data/ txt files with dictionary files from zip
          find data -maxdepth 1 -type f -delete
          find /tmp/opencc-resources -maxdepth 1 -name '*.txt' -exec cp {} data/ \;
          cp /tmp/opencc-resources/opencc-resource-manifest.json .opencc-resource-manifest.json

          # Copy testdata (original method)
          mkdir -p test-data
          if [ "$RESOURCE_SOURCE" = "release" ]; then
            cp /tmp/opencc-release/testcases.json test-data/testcases.json
          else
            cp upstream-opencc/test/testcases/testcases.json test-data/testcases.json
          fi

          # Remove upstream clone (keep /tmp/opencc-resources for the next step)
          if [ "$RESOURCE_SOURCE" = "build" ]; then
            rm -rf upstream-opencc
          fi

      - name: Add copyright headers to dictionary files
        run: |
          python3 scripts/add_dict_headers.py /tmp/opencc-resources/opencc-resource-manifest.json "${{ steps.release.outputs.sha || steps.upstream.outputs.sha }}"
          rm -rf /tmp/opencc-resources

      - name: Check for substantial data diff
        id: diff
        run: |
          if python3 scripts/has_substantial_data_diff.py --manifest .opencc-resource-manifest.json test-data > /tmp/substantial-data-diff.txt; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
          cat /tmp/substantial-data-diff.txt

      - name: Stop when only generated metadata changed
        if: steps.diff.outputs.changed != 'true'
        run: |
          echo "No substantial dictionary/config/testcase changes detected."

      - name: Setup Node.js
        if: steps.diff.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update package.json version
        if: steps.diff.outputs.changed == 'true'
        id: version
        run: |
          CURRENT_VERSION="$(node -p 'require("./package.json").version')"
          if [ -n "$PACKAGE_VERSION" ]; then
            NEXT_VERSION="$PACKAGE_VERSION"
          else
            BASE_VERSION="${CURRENT_VERSION%%-*}"
            TODAY_UTC="$(date -u +%Y%m%d)"
            NEXT_VERSION="${BASE_VERSION}-next.${TODAY_UTC}"
          fi
          if [ "$CURRENT_VERSION" != "$NEXT_VERSION" ]; then
            npm version "$NEXT_VERSION" --no-git-tag-version
          fi
          echo "value=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Write pull request body
        if: steps.diff.outputs.changed == 'true'
        run: |
          {
            echo "Automated sync from upstream."
            echo "- Resource source: \`$RESOURCE_SOURCE\`"
            echo "- Upstream ref: \`${{ steps.release.outputs.ref || env.UPSTREAM_REF }}\`"
            echo "- Upstream commit: \`${{ steps.release.outputs.sha || steps.upstream.outputs.sha }}\`"
            echo "- New version: \`${{ steps.version.outputs.value }}\`"
            if [ "$RESOURCE_SOURCE" = "release" ]; then
              echo "- Resource URL: \`${{ steps.release.outputs.resource_url }}\`"
            fi
            echo
            echo "Substantial data diff:"
            echo
            echo '```text'
            cat /tmp/substantial-data-diff.txt
            echo '```'
          } > /tmp/update-data-pr-body.md

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update data from byvoid/OpenCC@${{ steps.release.outputs.sha || steps.upstream.outputs.sha }}"
          title: "Sync dictionary data from byvoid/OpenCC@${{ steps.release.outputs.sha || steps.upstream.outputs.sha }}"
          body-path: /tmp/update-data-pr-body.md
          branch: sync-data
          base: main
